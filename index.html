<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <title>DASH</title>
        <style>
            body{
                margin: 0;
                background: #0f0f0f;
                overflow: hidden;
                font-family: 'inter', sans-serif;
                color: white;

                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            
            canvas{
                display:block;
                margin:0 auto;
                background:#111;
            }
            #message{
                position:absolute;
                left: 50%;
                top:50%;
                transform:translate(-50%, -50%);
                font-size:28px;
                text-align:center;
                pointer-events:none;
            }
        </style>
    </head>
    <body>
        <div id="message">Press SPACE to start</div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <script>
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            const groundY = 340;

            let gameStarted=false;
            let gameOver=false;

            let player ={
                x:100,
                y:groundY,
                size: 30,
                velocityY:0,
                jumpPower:-14,
                gravity:0.7,
                onGround:true
            };

            let obstacles=[];
            let frameCount=0;
            let score=0;
            let level = 1;
            let speed = 5;
            let nextLevelScore = 600;

            function spawnObstacle(){
                let height = 20+ Math.random() * 60;

                obstacles.push({
                    x:canvas.width,
                    width:30,
                    height:height
                });
            }

            function drawPlayer(){
                ctx.fillStyle= "#00ffcc";
                ctx.fillRect(player.x, player.y - player.size, player.size, player.size);
            }

            function drawTriangle(obs){
                ctx.fillStyle="#ff4444";
                ctx.beginPath();
                ctx.moveTo(obs.x, groundY);
                ctx.lineTo(obs.x + obs.width/2, groundY-obs.height);
                ctx.lineTo(obs.x + obs.width, groundY);
                ctx.closePath();
                ctx.fill();
            }

            function update(){
                if(!gameStarted || gameOver)return;
                player.velocityY += player.gravity;
                player.y += player.velocityY;

                if(player.y >= groundY){
                    player.y=groundY;
                    player.velocityY = 0;
                    player.onGround = true;
                }else{
                    player.onGround=false;
                }

                for(let i = 0; i < obstacles.length; i++){
                    obstacles[i].x -= speed;
                    const obsTop = groundY - obstacles[i].height;
                    const safeZone = obsTop + obstacles[i].height * 0.75;

                    if (player.x < obstacles[i].x + obstacles[i].width && player.x + player.size > obstacles[i].x && player.y > safeZone - player.size)
                    {
                        endGame();
                    }
                }
                obstacles = obstacles.filter(o => o.x > -50);

                frameCount++;
                if(frameCount % 90 === 0){
                    spawnObstacle();
                }

                score++;

                if (score >= nextLevelScore){
                    level++;
                    speed += 0.5;
                    nextLevelScore += 600;
                }
            }

            function draw(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle="#333";
                ctx.fillRect(0, groundY, canvas.width, 60);
                drawPlayer();
                for(let obs of obstacles){
                    drawTriangle(obs);
                }
                ctx.font = "16px Arial";
                ctx.fillStyle = "white";
                ctx.fillText("Score: " + score, 10, 20);
                ctx.fillText("Level: " + level, 10, 40);
            }
            function loop(){
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();

            document.addEventListener("keydown", (e) => {
                if(e.code === "Space"){
                    if(!gameStarted){
                        gameStarted = true;
                        document.getElementById("message").style.display = "none";
                    }
                    if(gameOver){
                        location.reload();
                    }
                    if(player.onGround){
                        player.velocityY = player.jumpPower;
                    }
                }
            });

            function endGame(){
                gameOver = true;
                document.getElementById("message").style.display = "block";
                document.getElementById("message").innerText = "Game Over : Press SPACE to restart";
            }
        </script>
    </body>
</html>
