<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <title>DASH</title>
        <style>
            body{
                margin: 0;
                background: #0f0f0f;
                overflow: hidden;
                font-family: 'inter', sans-serif;
                color: white;

                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            
            canvas{
                display:block;
                margin:0 auto;
                background:#111;
                border: 3px solid #00ffcc;
                border-radius: 16px;
                box-shadow: 0 0 15px #00ffcc;
            }
            #message{
                position:absolute;
                left: 50%;
                top:50%;
                transform:translate(-50%, -50%);
                font-size:28px;
                text-align:center;
                pointer-events:none;
            }
            #title{
                position:absolute;
                top:20px;
                left:50%;
                transform:translateX(-50%);
                font-size:64px;
                font-weight:600;
                letter-spacing:6px;
                color:#00ffcc;
                font-family:'Inter', sans-serif;
                text-shadow:0 0 12px #00ffcc;
                pointer-events: none;
                transition: opacity 0.6s ease;
                animation: introDrop 0.8s ease-out;
            }

            @keyframes introDrop{
                0%{
                    transform: translateX(-50%) translateY(-30px);
                    opacity:0;
                }
                100%{
                    transform:translateX(-50%) translateY(0);
                    opacity:1;
                }
            }

            #flash{
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:white;
                opacity:0;
                pointer-events:none;
                z-index:999;
            }
        </style>
    </head>
    <body>
        <div id="title">DASH</div>
        <div id="message">Press SPACE to start</div>
        <div id="flash"></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <script>
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");

            const groundY = 340;

            let gameStarted=false;
            let gameOver=false;

            let player ={
                x:100,
                y:groundY,
                size: 30,
                velocityY:0,
                jumpPower:-14,
                gravity:0.7,
                onGround:true
            };

            let obstacles=[];
            let frameCount=0;
            let score=0;
            let level = 1;
            let speed = 5;
            let nextLevelScore = 600;
            let cubeRotation =0;
            let backgroundOffset=0;
            let platforms = [
                { x:300, y:280, width:120, height:10},
                { x:600, y:240, width:140, height:10},
                { x:950, y:300, width:160, height:10}
            ];

            function spawnObstacle(){
                let height = 20+ Math.random() * 60;

                obstacles.push({
                    x:canvas.width,
                    width:30,
                    height:height
                });
            }

            function drawPlayer(){
                const x = player.x;
                const y = player.y - player.size;
                const size = player.size;
                const radius = 5;
                ctx.save();
                ctx.translate(x+size/2, y+size/2);
                ctx.rotate(cubeRotation);
                ctx.shadowColor = "#00ffcc";
                ctx.shadowBlur = 25;
                ctx.fillStyle = "#00ffcc";
                ctx.beginPath();
                ctx.moveTo(-size/2 + radius, -size/2);
                ctx.lineTo(size/2 - radius, -size/2);
                ctx.quadraticCurveTo(size/2, -size/2, size/2, -size/2+radius);
                ctx.lineTo(size/2,size/2-radius);
                ctx.quadraticCurveTo(size/2,size/2,size/2-radius,size/2);
                ctx.lineTo(-size/2+radius,size/2);
                ctx.quadraticCurveTo(-size/2,size/2,-size/2,size/2-radius);
                ctx.lineTo(-size/2, -size/2 + radius);
                ctx.quadraticCurveTo(-size/2, -size/2, -size/2 + radius, -size/2)
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur=0;
                ctx.restore();
            }

            function drawTriangle(obs){
                ctx.shadowColor = "#ff4444";
                ctx.shadowBlur = 20;
                ctx.fillStyle="#ff4444";
                ctx.beginPath();
                ctx.moveTo(obs.x, groundY);
                ctx.lineTo(obs.x + obs.width/2, groundY-obs.height);
                ctx.lineTo(obs.x + obs.width, groundY);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function drawPlatforms(){
                ctx.fillStyle = "#00ffcc";
                ctx.shadowColor = "#00ffcc";
                ctx.shadowBlur = 15;

                for(let p of platforms){
                    ctx.fillRect(p.x,p.y,p.width,p.height);
                }
                ctx.shadowBlur = 0;
            }

            function update(){
                if(!gameStarted || gameOver)return;
                player.velocityY += player.gravity;
                player.y += player.velocityY;

                if(player.y >= groundY){
                    player.y=groundY;
                    player.velocityY = 0;
                    player.onGround = true;
                }else{
                    player.onGround=false;
                }
                if(!player.onGround){
                    cubeRotation += speed * 0.03;
                }else{
                    const quarterTurn = Math.PI / 2;
                    cubeRotation = Math.round(cubeRotation/quarterTurn)*quarterTurn;
                }
                for(let p of platforms){
                    p.x -= speed;
                }
                platforms = platforms.filter(p => p.x + p.width > -50);

                for(let i = 0; i < obstacles.length; i++){
                    obstacles[i].x -= speed;
                    const obsTop = groundY - obstacles[i].height;
                    const safeZone = obsTop + obstacles[i].height * 0.75;

                    if (player.x < obstacles[i].x + obstacles[i].width && player.x + player.size > obstacles[i].x && player.y > safeZone - player.size)
                    {
                        endGame();
                    }
                }
                for(let p of platforms){
                    const isLanding = player.x < p.x + p.width && player.x + player.size > p.x && player.y <= p.y && player.y + player.velocityY >= p.y;
                    if(isLanding){
                        player.y = p.y;
                        player.velocityY=0;
                        player.onGround = true;
                    }
                }
                obstacles = obstacles.filter(o => o.x > -50);

                
                const gridSize = 40;
                backgroundOffset = (backgroundOffset - speed * 0.4)%gridSize;

                frameCount++;
                if(frameCount % 90 === 0){
                    spawnObstacle();
                }
                score++;
                if (score >= nextLevelScore){
                    level++;
                    speed += 0.7;
                    nextLevelScore += 600;
                }
            }

            function drawBackground(){
                ctx.fillStyle ="#111";
                ctx.fillRect(0,0,canvas.width,groundY);
                const gridSize = 40;
                //ctx.strokeStyle = "rgba(0,255,204,0,08)";
                const glow = 0.05 + Math.sin(frameCount*0.03) * 0.03;
                ctx.strokeStyle = `rgba(0,255,204,${glow})`;
                ctx.lineWidth = 1;

                for(let x=-gridSize + backgroundOffset; x <= canvas.width; x += gridSize){
                    ctx.beginPath();
                    ctx.moveTo(x,0);
                    ctx.lineTo(x, groundY);
                    ctx.stroke();
                }
                for(let y=0; y <= groundY; y += gridSize){
                    ctx.beginPath();
                    ctx.moveTo(0,y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                ctx.strokeStyle ="rgba(0,255,204,0.15)";
                ctx.lineWidth = 2;

                for(let x = -gridSize *4 + backgroundOffset; x <= canvas.width; x += gridSize * 4){
                    for(let y=0; y <= groundY; y += gridSize *4){
                        ctx.strokeRect(
                            x,
                            y,
                            gridSize*4,
                            gridSize*4
                        );
                    }
                }
            }

            function draw(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                drawBackground();
                ctx.fillStyle="#333";
                ctx.fillRect(0, groundY, canvas.width, 60);
                ctx.shadowColor = "#ff4444";
                ctx.shadowBlur = 15;
                ctx.fillStyle = "#ff4444";
                ctx.fillRect(0,groundY, canvas.width, 3);
                ctx.shadowBlur = 0;
                drawPlayer();
                drawPlatforms();
                for(let obs of obstacles){
                    drawTriangle(obs);
                }
                ctx.font = "600 16px Inter, sans-serif";
                ctx.fillStyle = "white";
                ctx.fillText("Score: " + score, 10, 20);
                ctx.fillText("Level: " + level, 10, 40);
            }
            function loop(){
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();

            document.addEventListener("keydown", (e) => {
                if(e.code === "Space"){
                    if(!gameStarted){
                        gameStarted = true;
                        document.getElementById("message").style.display = "none";

                        const title = document.getElementById("title");
                        title.style.opacity = "0";
                        flashScreen();
                    }
                    if(gameOver){
                        location.reload();
                    }
                    if(player.onGround){
                        player.velocityY = player.jumpPower;
                    }
                }
            });

            function flashScreen(){
                const flash = document.getElementById("flash");
                flash.style.opacity = "1";

                setTimeout(() => {
                    flash.style.transition = "opacity 0.3s ease";
                    flash.style.opacity = "0";
                }, 50);
            }

            function endGame(){
                gameOver = true;
                document.getElementById("message").style.display = "block";
                document.getElementById("message").innerText = "Game Over : Press SPACE to restart";
            }
        </script>
    </body>
</html>
